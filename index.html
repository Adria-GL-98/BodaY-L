<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Yaiza & Luis · La Boda</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: #f5ede4;
  font-family: 'Jost', sans-serif;
}

/* ── Scroll container horizontal ── */
.scroll-x {
  display: flex;
  flex-direction: row;
  width: 300vw;
  height: 100vh;
  overflow: hidden;
  transition: transform 0.7s cubic-bezier(0.77,0,0.18,1);
}

/* ── Páginas ── */
.page {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: linear-gradient(160deg, #f9f4ef 0%, #f0e9e0 100%);
}

/* ─── PÁGINA 1: vertical centrada ─── */
.p1-content {
  text-align: center;
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  z-index: 2;
}

.rings { font-size: 2rem; margin-bottom: 0.5rem; }

.names {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 300;
  font-style: italic;
  color: #6b4c3b;
  line-height: 1.15;
  margin-bottom: 0.25rem;
}
.amp { color: #c9856a; font-style: normal; margin: 0 0.2em; }

.date-lbl {
  font-size: 0.68rem;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #b08070;
  margin-bottom: 2rem;
}

.countdown {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 1.8rem;
}

.ubox {
  background: rgba(255,255,255,0.78);
  border: 0.5px solid rgba(180,140,120,0.25);
  border-radius: 12px;
  padding: 0.9rem 1rem 0.75rem;
  min-width: 68px;
  text-align: center;
}
.unum {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.3rem;
  font-weight: 400;
  color: #6b4c3b;
  line-height: 1;
  display: block;
}
.ulbl {
  font-size: 0.6rem;
  font-weight: 300;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #b08070;
  display: block;
  margin-top: 4px;
}

.divider {
  width: 50px; height: 0.5px;
  background: rgba(180,140,120,0.35);
  margin: 0 auto 1.2rem;
}

.msg {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-style: italic;
  color: #9a7060;
  line-height: 1.7;
}

/* swipe hint */
.swipe-hint {
  position: absolute;
  bottom: calc(1.8rem + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  animation: bounce 2s ease-in-out infinite;
  z-index: 3;
}
.swipe-hint span {
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #c9a090;
  font-weight: 300;
}
.swipe-hint svg { opacity: 0.45; }

@keyframes bounce {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(6px); }
}

/* ─── PÁGINA 2: tres columnas con fotos ─── */
.p2-inner {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  gap: 0;
}

.col-photo {
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem 0.8rem;
  transition: transform 0.8s cubic-bezier(0.77,0,0.18,1), opacity 0.8s ease;
}
.col-photo.left-photo  { transform: translateX(-100vw); opacity: 0; }
.col-photo.right-photo { transform: translateX(100vw);  opacity: 0; }
.col-photo.in {
  transform: translateX(0) !important;
  opacity: 1 !important;
}

.photo-wrap {
  width: 100%;
  max-width: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
}
.photo-frame {
  border-radius: 14px;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,0.9);
  box-shadow: 0 8px 28px rgba(107,76,59,0.2);
  width: 100%;
}
.photo-frame img {
  width: 100%;
  display: block;
  object-fit: cover;
  max-height: 55vh;
}
.photo-cap {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #b08070;
  font-weight: 300;
  text-align: center;
}

/* columna central en página 2 */
.col-center {
  flex: 1.2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 1rem 0.5rem;
}

/* countdown horizontal en p2 */
.countdown-h {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  align-items: center;
  width: 100%;
}
.countdown-h .countdown {
  flex-direction: column;
  gap: 0.4rem;
  width: 100%;
}
.countdown-h .ubox {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 0.9rem;
  min-width: unset;
  width: 100%;
  max-width: 160px;
  border-radius: 10px;
}
.countdown-h .unum {
  font-size: 1.9rem;
}
.countdown-h .ulbl {
  margin-top: 0;
}

/* pétalos */
.petal {
  position: absolute;
  width: 9px; height: 13px;
  border-radius: 50% 0 50% 0;
  opacity: 0.18;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  0%   { transform: translateY(-30px) rotate(0deg); opacity: 0.22; }
  100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
}

/* back hint en p2 */
.back-hint {
  position: absolute;
  top: 1.2rem;
  left: 1.2rem;
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #c9a090;
  font-weight: 300;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
</style>
</head>
<body>

<div class="scroll-x" id="scroller">

  <!-- ══════════ PÁGINA 1 ══════════ -->
  <div class="page" id="p1">

    <!-- pétalos -->
    <div class="petal" style="left:8%;background:#e8a090;animation-duration:7s;animation-delay:0s;"></div>

    <div class="petal" style="left:50%;background:#e8b0a0;animation-duration:6s;animation-delay:3s;"></div>
    <div class="petal" style="left:72%;background:#c8a0c0;animation-duration:8s;animation-delay:0.8s;"></div>
    <div class="petal" style="left:90%;background:#e0a090;animation-duration:7.5s;animation-delay:2s;"></div>

    <div class="p1-content">
      <div class="rings">💍</div>
      <div class="names">Yaiza <span class="amp">&</span> Luis</div>
      <div class="date-lbl">24 de abril de 2027 · 12:00 h</div>

      <div class="countdown">
        <div class="ubox"><span class="unum" id="p1-dias">--</span><span class="ulbl">Días</span></div>

        <div class="ubox"><span class="unum" id="p1-min">--</span><span class="ulbl">Min</span></div>
        <div class="ubox"><span class="unum" id="p1-seg">--</span><span class="ulbl">Seg</span></div>

      <div class="msg">Cada segundo es un paso más cerca<br>del día más especial 🌸</div>
    </div>

      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c9856a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
      <span>desliza</span>
    </div>
  </div>

  <div class="page" style="background:transparent;pointer-events:none;"></div>

    <div class="petal" style="left:85%;background:#e8c0b0;animation-duration:7s;animation-delay:1s;"></div>

    <div class="back-hint" onclick="goTo(0)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#c9856a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      volver

<script>
const scroller = document.getElementById('scroller');
const hint     = document.getElementById('hint');
let current    = 0; // 0 = p1, 1 = p3
let animating  = false;

function goTo(page) {
  if (animating) return;
  animating = true;
  current = page;
  scroller.style.transform = page === 0
    ? 'translateX(0)'
    : 'translateX(-200vw)';

  if (page === 1) {
    // trigger foto animations
    setTimeout(() => {
      document.getElementById('photo-left').classList.add('in');
      document.getElementById('photo-right').classList.add('in');
    }, 100);
    hint.style.opacity = '0';
  } else {
    document.getElementById('photo-left').classList.remove('in');
    document.getElementById('photo-right').classList.remove('in');
    hint.style.opacity = '1';
  }

  setTimeout(() => { animating = false; }, 800);
}

// ── Swipe / drag ──
let startX = 0, startY = 0, dragging = false;

function onStart(x, y) { startX = x; startY = y; dragging = true; }
function onEnd(x, y) {
  if (!dragging) return;
  dragging = false;
  const dx = x - startX;
  const dy = Math.abs(y - startY);
  if (dy > 60) return; // mostly vertical → ignore
  if (dx < -50 && current === 0) goTo(1);
  if (dx >  50 && current === 1) goTo(0);
}

document.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
document.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY));
document.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
document.addEventListener('mouseup',    e => onEnd(e.clientX, e.clientY));

// ── Tick ──
const wedding = new Date(2027, 3, 24, 12, 0, 0);
const pad = n => String(n).padStart(2, '0');

function tick() {
  const diff = wedding - new Date();
  if (diff <= 0) {
    ['p1-dias','p1-horas','p1-min','p1-seg',
     'p3-dias','p3-horas','p3-min','p3-seg']
      .forEach(id => { const el = document.getElementById(id); if(el) el.textContent = '0'; });
    return;
  }
  const days  = Math.floor(diff / 86400000);
  const hours = pad(Math.floor((diff % 86400000) / 3600000));
  const mins  = pad(Math.floor((diff % 3600000)  / 60000));
  const secs  = pad(Math.floor((diff % 60000)    / 1000));

  document.getElementById('p1-dias').textContent  = days;
  document.getElementById('p1-horas').textContent = hours;
  document.getElementById('p1-min').textContent   = mins;
  document.getElementById('p1-seg').textContent   = secs;
  document.getElementById('p3-dias').textContent  = days;
  document.getElementById('p3-horas').textContent = hours;
  document.getElementById('p3-min').textContent   = mins;
  document.getElementById('p3-seg').textContent   = secs;
}

tick();
setInterval(tick, 1000);
</script>
